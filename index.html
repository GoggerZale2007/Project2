<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chessi</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --light-sq: #e0e0e0;
            --dark-sq: #4a4e69;
            --highlight: rgba(255, 255, 0, 0.4);
            --accent: #95d5b2;
            --panel: #16213e;
        }

        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; background-color: var(--bg);
            font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden;
        }

        h1 { margin: 0; font-size: 3rem; color: var(--accent); }

        /* Settings UI */
        #settings-btn {
            position: absolute; top: 20px; right: 20px;
            font-size: 24px; cursor: pointer; background: none; border: none; color: white;
        }

        #settings-modal {
            display: none; position: fixed; z-index: 1000;
            background: var(--panel); padding: 20px; border-radius: 10px;
            border: 2px solid var(--accent); box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .toggle-row { display: flex; justify-content: space-between; gap: 40px; margin: 15px 0; align-items: center; }

        /* Board & Pieces */
        #board-container { position: relative; margin-top: 10px; }
        #board {
            display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px);
            border: 8px solid #0f3460; box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        .square {
            width: 60px; height: 60px; display: flex; justify-content: center; align-items: center;
            font-size: 40px; position: relative; cursor: pointer;
        }

        .light { background-color: var(--light-sq); color: #222; }
        .dark { background-color: var(--dark-sq); color: white; }
        .selected { background-color: var(--highlight) !important; }

        /* FX */
        .shake { animation: shake 0.2s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translate(0,0); }
            25% { transform: translate(-4px, 4px); }
            75% { transform: translate(4px, -4px); }
        }

        .particle {
            position: absolute; pointer-events: none; font-size: 24px;
            animation: explode 0.7s forwards ease-out; z-index: 100;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(360deg); opacity: 0; }
        }

        .btn { background: var(--accent); color: var(--bg); border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <button id="settings-btn" onclick="toggleSettings()">⚙️</button>

    <div id="settings-modal">
        <h2 style="margin-top:0">Settings</h2>
        <div class="toggle-row">
            <span>Shatter Pieces</span>
            <input type="checkbox" id="fx-shatter" checked>
        </div>
        <div class="toggle-row">
            <span>Screen Shake</span>
            <input type="checkbox" id="fx-shake" checked>
        </div>
        <button class="btn" style="width:100%" onclick="toggleSettings()">Close</button>
    </div>

    <h1>Chessi</h1>
    <div id="game-info">White's Turn</div>
    
    <div id="board-container">
        <div id="board"></div>
    </div>

    <script>
        const boardElement = document.getElementById('board');
        const infoElement = document.getElementById('game-info');
        const modal = document.getElementById('settings-modal');
        
        let boardState = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];

        const pieceIcons = {
            'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
            'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
        };

        let turn = 'white';
        let selectedSquare = null;

        function toggleSettings() {
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }

        function createExplosion(x, y, icon) {
            if (!document.getElementById('fx-shatter').checked) return;
            
            for (let i = 0; i < 10; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.textContent = icon;
                p.style.setProperty('--tx', `${(Math.random() - 0.5) * 250}px`);
                p.style.setProperty('--ty', `${(Math.random() - 0.5) * 250}px`);
                p.style.left = `${x}px`;
                p.style.top = `${y}px`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 700);
            }

            if (document.getElementById('fx-shake').checked) {
                boardElement.classList.add('shake');
                setTimeout(() => boardElement.classList.remove('shake'), 200);
            }
        }

        function renderBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    square.className = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                    const piece = boardState[r][c];
                    if (piece) {
                        square.textContent = pieceIcons[piece];
                        square.setAttribute('draggable', 'true');
                    }
                    square.onclick = (e) => handleSquareClick(r, c, e);
                    square.ondragstart = (e) => handleDragStart(e, r, c);
                    square.ondragover = (e) => e.preventDefault();
                    square.ondrop = (e) => handleDrop(e, r, c);
                    boardElement.appendChild(square);
                }
            }
        }

        function movePiece(fromR, fromC, toR, toC) {
            if (fromR === toR && fromC === toC) return;
            
            const targetPiece = boardState[toR][toC];
            const movingPiece = boardState[fromR][fromC];

            if (targetPiece) {
                const targetSquare = boardElement.children[toR * 8 + toC];
                const rect = targetSquare.getBoundingClientRect();
                createExplosion(rect.left + 15, rect.top + 15, pieceIcons[targetPiece]);
                
                if (targetPiece.toLowerCase() === 'k') {
                    setTimeout(() => { 
                        alert("GAME OVER: " + turn.toUpperCase() + " WINS!"); 
                        location.reload(); 
                    }, 500);
                }
            }

            boardState[toR][toC] = movingPiece;
            boardState[fromR][fromC] = '';
            turn = turn === 'white' ? 'black' : 'white';
            infoElement.textContent = turn.charAt(0).toUpperCase() + turn.slice(1) + "'s Turn";
            selectedSquare = null;
            renderBoard();
        }

        function handleSquareClick(r, c) {
            const piece = boardState[r][c];
            if (selectedSquare) {
                movePiece(selectedSquare[0], selectedSquare[1], r, c);
            } else if (piece && isCorrectTurn(piece)) {
                selectedSquare = [r, c];
                renderBoard();
                boardElement.children[r * 8 + c].classList.add('selected');
            }
        }

        function handleDragStart(e, r, c) {
            if (isCorrectTurn(boardState[r][c])) {
                e.dataTransfer.setData('text/plain', JSON.stringify({r, c}));
            } else e.preventDefault();
        }

        function handleDrop(e, r, c) {
            e.preventDefault();
            const data = JSON.parse(e.dataTransfer.getData('text/plain'));
            movePiece(data.r, data.c, r, c);
        }

        function isCorrectTurn(p) {
            return (turn === 'white' && p === p.toUpperCase()) || (turn === 'black' && p === p.toLowerCase());
        }

        renderBoard();
    </script>
</body>
      </html>
