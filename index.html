<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CalcOS</title>
    <style>
        :root {
            --case: #232526;
            --lcd: #b8c4b1;
            --pixel: #1a1a1a;
            --k-fn: #333;
            --k-num: #eee;
            --k-act: #48a88d;
            --k-pwr: #b02a37;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        .calc {
            background: var(--case);
            width: 340px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 0 #000, 0 20px 40px rgba(0,0,0,0.8);
        }

        #lcd {
            background: #050505;
            height: 180px;
            border-radius: 4px;
            border: 4px solid #111;
            margin-bottom: 20px;
            padding: 15px;
            color: var(--pixel);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: background 0.2s;
        }

        #lcd.active { background: var(--lcd); }

        /* MINECRAFT PIXEL LOADER (NO TEXT) */
        .mc-loader {
            width: 6px;
            height: 6px;
            background: transparent;
            margin: 30px auto;
            animation: mc-spin 1s steps(8) infinite;
        }

        @keyframes mc-spin {
            0% { box-shadow: 0 -12px var(--pixel), 8px -8px #777, 12px 0 #777, 8px 8px #777, 0 12px #777, -8px 8px #777, -12px 0 #777, -8px -8px #777; }
            12.5% { box-shadow: 0 -12px #777, 8px -8px var(--pixel), 12px 0 #777, 8px 8px #777, 0 12px #777, -8px 8px #777, -12px 0 #777, -8px -8px #777; }
            25% { box-shadow: 0 -12px #777, 8px -8px #777, 12px 0 var(--pixel), 8px 8px #777, 0 12px #777, -8px 8px #777, -12px 0 #777, -8px -8px #777; }
            37.5% { box-shadow: 0 -12px #777, 8px -8px #777, 12px 0 #777, 8px 8px var(--pixel), 0 12px #777, -8px 8px #777, -12px 0 #777, -8px -8px #777; }
            50% { box-shadow: 0 -12px #777, 8px -8px #777, 12px 0 #777, 8px 8px #777, 0 12px var(--pixel), -8px 8px #777, -12px 0 #777, -8px -8px #777; }
            62.5% { box-shadow: 0 -12px #777, 8px -8px #777, 12px 0 #777, 8px 8px #777, 0 12px #777, -8px 8px var(--pixel), -12px 0 #777, -8px -8px #777; }
            75% { box-shadow: 0 -12px #777, 8px -8px #777, 12px 0 #777, 8px 8px #777, 0 12px #777, -8px 8px #777, -12px 0 var(--pixel), -8px -8px #777; }
            87.5% { box-shadow: 0 -12px #777, 8px -8px #777, 12px 0 #777, 8px 8px #777, 0 12px #777, -8px 8px #777, -12px 0 #777, -8px -8px var(--pixel); }
            100% { box-shadow: 0 -12px var(--pixel), 8px -8px #777, 12px 0 #777, 8px 8px #777, 0 12px #777, -8px 8px #777, -12px 0 #777, -8px -8px #777; }
        }

        /* CSS ICON ENGINE */
        .icon-px {
            width: 4px; height: 4px;
            background: transparent;
            margin: 15px auto;
        }

        .icon-install {
            box-shadow: 
                0 0 var(--pixel), 4px 0 var(--pixel), 8px 0 var(--pixel), 12px 0 var(--pixel), 16px 0 var(--pixel),
                0 4px var(--pixel), 16px 4px var(--pixel), 24px 4px var(--pixel),
                0 8px var(--pixel), 4px 8px var(--pixel), 8px 8px var(--pixel), 12px 8px var(--pixel), 16px 8px var(--pixel), 20px 8px var(--pixel), 24px 8px var(--pixel), 28px 8px var(--pixel),
                0 12px var(--pixel), 16px 12px var(--pixel), 24px 12px var(--pixel),
                0 16px var(--pixel), 4px 16px var(--pixel), 8px 16px var(--pixel), 12px 16px var(--pixel), 16px 16px var(--pixel), 24px 16px var(--pixel);
        }

        .icon-off {
            box-shadow: 
                8px 0 var(--pixel),
                4px 4px var(--pixel), 12px 4px var(--pixel),
                0 8px var(--pixel), 16px 8px var(--pixel),
                4px 12px var(--pixel), 8px 12px var(--pixel), 12px 12px var(--pixel);
        }

        #scr-m { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #scr-i { width: 100%; text-align: right; font-size: 28px; min-height: 40px; font-weight: bold; margin-top: 10px; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        button { height: 44px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #000; transition: 0.1s; }
        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #000; }
        .f { background: var(--k-fn); color: white; font-size: 10px; }
        .n { background: var(--k-num); color: #000; font-size: 18px; }
        .a { background: var(--k-act); color: white; }
        .p { background: var(--k-pwr); color: white; }
    </style>
</head>
<body>

    <div class="calc">
        <div id="lcd">
            <div id="scr-m"></div>
            <div id="scr-i"></div>
        </div>

        <div class="grid">
            <button class="f" onclick="btn('shf')">SHIFT</button>
            <button class="f" onclick="btn('menu')">MENU</button>
            <button class="f" onclick="btn('left')">◀</button>
            <button class="p" onclick="btn('on')">ON</button>
        </div>

        <div class="grid">
            <button class="n" onclick="add('7')">7</button>
            <button class="n" onclick="add('8')">8</button>
            <button class="n" onclick="add('9')">9</button>
            <button class="a" onclick="btn('del')">DEL</button>
            
            <button class="n" onclick="add('4')">4</button>
            <button class="n" onclick="add('5')">5</button>
            <button class="n" onclick="add('6')">6</button>
            <button class="a" onclick="btn('ac')">AC</button>
            
            <button class="n" onclick="add('1')">1</button>
            <button class="n" onclick="add('2')">2</button>
            <button class="n" onclick="add('3')">3</button>
            <button class="n" onclick="add('*')">×</button>

            <button class="n" onclick="add('0')">0</button>
            <button class="n" onclick="add('.')">.</button>
            <button class="n" onclick="add('/')">÷</button>
            <button class="n" onclick="btn('exe')">=</button>
        </div>
    </div>

    <script>
        const st = { on: false, ok: false, mode: "OFF", val: "" };
        const lcd = document.getElementById('lcd');
        const m = document.getElementById('scr-m');
        const i = document.getElementById('scr-i');

        function btn(t) {
            if (t === 'on') {
                if (st.on) return;
                st.on = true; lcd.classList.add('active'); boot();
                return;
            }
            if (!st.on) return;
            if (st.mode === "ERR" && (t === 'ac' || t === 'left')) { st.mode = "CALC"; render(); return; }
            if (t === 'ac') { if (!st.ok) boot(); else { st.val = ""; render(); } }
            if (t === 'del') { st.val = st.val.slice(0, -1); render(); }
            if (t === 'exe') {
                try {
                    if (st.val.includes("/0")) throw "Math ERROR";
                    let res = eval(st.val);
                    st.val = res.toString();
                    render();
                } catch(e) {
                    st.mode = "ERR";
                    m.innerHTML = `<div style="font-weight:bold">${e === "Math ERROR" ? e : "Syntax ERROR"}</div><div style="font-size:10px; margin-top:10px">[AC]:Cancel [◀]:Move</div>`;
                    i.innerText = "";
                }
            }
        }

        function add(v) {
            if (!st.on) return;
            if (st.mode === "BOOT") {
                if (v === '1') install();
                if (v === '2') shut();
            } else if (st.mode === "CALC") {
                st.val += v;
                render();
            }
        }

        function boot() {
            st.mode = "BOOT"; i.innerText = "";
            m.innerHTML = `<div style="font-size:12px; font-weight:bold">CalcOS BOOTLOADER</div><br>1:INSTALL  2:OFF`;
        }

        function install() {
            st.mode = "BUSY";
            m.innerHTML = `<div class="icon-px icon-install"></div>DISK_FORMAT`;
            setTimeout(() => {
                let p = 0;
                const inv = setInterval(() => {
                    p += 20;
                    m.innerHTML = `<div class="mc-loader"></div>INSTALLING ${p}%`;
                    if (p >= 100) {
                        clearInterval(inv);
                        st.ok = true; st.mode = "CALC";
                        m.innerHTML = "OS SUCCESS<br>PRESS AC";
                    }
                }, 600);
            }, 800);
        }

        function render() { m.innerHTML = ""; i.innerText = st.val || "0"; }

        function shut() {
            st.on = false; st.mode = "OFF";
            m.innerHTML = `<div class="icon-px icon-off" style="margin-left:45%"></div>BYE`;
            i.innerText = "";
            setTimeout(() => { lcd.classList.remove('active'); m.innerHTML = ""; }, 1000);
        }
    </script>
</body>
</html>
