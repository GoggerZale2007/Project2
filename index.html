<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Code-Generated Guitar</title>
    <style>
        body { 
            background: #1a1a1a; margin: 0; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: sans-serif; touch-action: none; overflow: hidden;
        }
        #fretboard {
            width: 90vw; height: 70vh;
            background: #3d2410; border: 4px solid #222;
            display: flex; flex-direction: column; justify-content: space-around;
            position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .string {
            width: 100%; height: 15%; display: flex; align-items: center;
            position: relative; z-index: 2;
        }
        /* Visual string line */
        .line {
            width: 100%; background: #ddd; 
            box-shadow: 0 2px 2px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        .fret-wire {
            position: absolute; top: 0; bottom: 0; width: 2px;
            background: silver; z-index: 1;
        }
        .active { filter: brightness(2); transform: scaleY(1.2); transition: 0.1s; }
        .controls { color: #888; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="controls">Landscape Mode: Swipe the strings to generate sound via code</div>

    <div id="fretboard">
        <div class="fret-wire" style="left: 25%"></div>
        <div class="fret-wire" style="left: 50%"></div>
        <div class="fret-wire" style="left: 75%"></div>

        <div class="string" data-hz="329.63"><div class="line" style="height:1px"></div></div> <div class="string" data-hz="246.94"><div class="line" style="height:2px"></div></div> <div class="string" data-hz="196.00"><div class="line" style="height:3px"></div></div> <div class="string" data-hz="146.83"><div class="line" style="height:4px"></div></div> <div class="string" data-hz="110.00"><div class="line" style="height:5px"></div></div> <div class="string" data-hz="82.41"> <div class="line" style="height:6px"></div></div> </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let lastString = null;

        // Function to create sound using code (Oscillators)
        function playNote(frequency) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            // 'triangle' sounds more like an acoustic guitar than 'sine' or 'square'
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            // Create a "Pluck" envelope (loud start, quick fade)
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.5);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        // Touch interaction logic
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const stringEl = target?.closest('.string');

            if (stringEl && stringEl !== lastString) {
                // Resume audio context (browsers block sound until first touch)
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                playNote(parseFloat(stringEl.dataset.hz));
                
                stringEl.classList.add('active');
                setTimeout(() => stringEl.classList.remove('active'), 100);
                lastString = stringEl;
            }
        });

        document.addEventListener('touchend', () => { lastString = null; });
    </script>
</body>
</html>
