<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cube Fighter Pro</title>
    <style>
        :root { --neon-green: #00ff99; --neon-red: #ff3333; --dark-bg: #0a0a0a; }
        body { background: var(--dark-bg); color: white; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; user-select: none; }
        
        /* UI Layout */
        #ui-layer { position: absolute; inset: 10px; pointer-events: none; z-index: 10; }
        #timer { font-size: 1.2rem; color: var(--neon-green); }
        
        /* Kill Feed & Join Messages */
        #feed { position: absolute; bottom: 20px; left: 10px; width: 300px; }
        .msg { background: rgba(0,0,0,0.8); padding: 5px 10px; margin-top: 5px; border-left: 3px solid var(--neon-green); font-size: 0.9rem; animation: slideIn 0.3s ease; }
        .pfp { width: 24px; height: 24px; border-radius: 50%; vertical-align: middle; margin-right: 8px; border: 1px solid white; }

        /* Leaderboard */
        #leaderboard { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #333; min-width: 150px; }
        .player-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem; }
        .dead { opacity: 0.4; text-decoration: line-through; }

        /* Victory Popup */
        #victory-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 3px solid var(--neon-green); padding: 30px; text-align: center; display: none; z-index: 100; box-shadow: 0 0 20px var(--neon-green); }
        #victory-pfp { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--neon-green); margin-bottom: 15px; }

        /* Admin Controls (Bottom Right) */
        #admin-panel { position: fixed; bottom: 10px; right: 10px; pointer-events: auto; }
        button { background: #222; color: var(--neon-green); border: 1px solid var(--neon-green); padding: 5px 10px; cursor: pointer; font-size: 0.7rem; }

        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="timer">00h 00m 00s</div>
    <div id="feed"></div>
    <div id="leaderboard">
        <div style="border-bottom: 1px solid #444; margin-bottom: 5px;">LIVE PLAYERS</div>
        <div id="player-list"></div>
    </div>
</div>

<div id="victory-popup">
    <h1 style="color: var(--neon-green); margin-top: 0;">VICTORY</h1>
    <img id="victory-pfp" src="" alt="">
    <h2 id="victory-name">PLAYER NAME</h2>
    <p>Champion of the Match</p>
</div>

<canvas id="gameCanvas"></canvas>

<div id="admin-panel">
    <button onclick="addFakePlayer()">TEST JOIN</button>
    <button onclick="setMode('Juggernaut')">MODE: JUGGERNAUT</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let players = [];
    let gameActive = true;
    let mode = "Standard"; // Standard, Stream, Hardcore, Deathmatch, Juggernaut
    let startTime = Date.now();

    class Player {
        constructor(id, name, pfp, isJuggernaut = false) {
            this.id = id;
            this.name = name;
            this.pfp = pfp || "https://via.placeholder.com/50";
            this.x = Math.random() * (canvas.width - 50);
            this.y = Math.random() * (canvas.height - 50);
            this.size = isJuggernaut ? 60 : 30;
            this.hp = isJuggernaut ? 500 : 100;
            this.maxHp = this.hp;
            this.ghostHp = this.hp;
            this.color = isJuggernaut ? "#ff00ff" : "#00ff99";
            this.alive = true;
            this.vx = (Math.random() - 0.5) * 4;
            this.vy = (Math.random() - 0.5) * 4;
        }

        draw() {
            if (!this.alive) return;
            
            // Movement logic
            this.x += this.vx; this.y += this.vy;
            if (this.x <= 0 || this.x + this.size >= canvas.width) this.vx *= -1;
            if (this.y <= 0 || this.y + this.size >= canvas.height) this.vy *= -1;

            // Health Bar Background
            ctx.fillStyle = "#333";
            ctx.fillRect(this.x, this.y - 15, this.size, 6);
            
            // Ghost Bar (Red)
            ctx.fillStyle = "#ff3333";
            let ghostWidth = (this.ghostHp / this.maxHp) * this.size;
            ctx.fillRect(this.x, this.y - 15, ghostWidth, 6);
            
            // Actual HP (Green)
            ctx.fillStyle = "#00ff99";
            let hpWidth = (this.hp / this.maxHp) * this.size;
            ctx.fillRect(this.x, this.y - 15, hpWidth, 6);

            // The Cube
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
            
            // Ghost HP catches up slowly
            if (this.ghostHp > this.hp) this.ghostHp -= 0.5;
        }

        takeDamage(amt, attacker) {
            if (!this.alive) return;
            this.hp -= amt;
            if (this.hp <= 0) {
                this.hp = 0;
                this.alive = false;
                logEvent(`<img src="${attacker.pfp}" class="pfp"> @${attacker.name} killed <img src="${this.pfp}" class="pfp"> @${this.name}!`);
                checkWinCondition();
            }
        }
    }

    function logEvent(html) {
        const feed = document.getElementById('feed');
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = html;
        feed.prepend(div);
        setTimeout(() => div.remove(), 6000);
    }

    function updateUI() {
        // Timer
        let diff = Math.floor((Date.now() - startTime) / 1000);
        let h = Math.floor(diff / 3600).toString().padStart(2, '0');
        let m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
        let s = (diff % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${h}h ${m}m ${s}s`;

        // Leaderboard
        const list = document.getElementById('player-list');
        list.innerHTML = players.map(p => `
            <div class="player-row ${!p.alive ? 'dead' : ''}">
                <span><img src="${p.pfp}" class="pfp">${p.name}</span>
                <span>${p.alive ? '🙂' : '💀'}</span>
            </div>
        `).join('');
    }

    function checkWinCondition() {
        let alive = players.filter(p => p.alive);
        if (alive.length === 1 && players.length > 1) {
            showVictory(alive[0]);
        }
    }

    function showVictory(winner) {
        const pop = document.getElementById('victory-popup');
        document.getElementById('victory-pfp').src = winner.pfp;
        document.getElementById('victory-name').innerText = "@" + winner.name;
        pop.style.display = "block";
        setTimeout(() => { pop.style.display = "none"; resetGame(); }, 8000);
    }

    function addFakePlayer() {
        let name = "Player_" + Math.floor(Math.random() * 999);
        let p = new Player(Date.now(), name, "https://api.dicebear.com/7.x/pixel-art/svg?seed=" + name);
        players.push(p);
        logEvent(`<img src="${p.pfp}" class="pfp"> @${p.name} joined the game!`);
    }

    function gameLoop() {
        ctx.fillStyle = "#0a0a0a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        players.forEach(p => {
            p.draw();
            // Simple random damage for demo
            if (p.alive && Math.random() < 0.005) {
                let attacker = players[Math.floor(Math.random() * players.length)];
                if (attacker !== p) p.takeDamage(20, attacker);
            }
        });

        updateUI();
        requestAnimationFrame(gameLoop);
    }

    function resetGame() {
        players = [];
        startTime = Date.now();
    }

    gameLoop();
</script>

</body>
  </html>
